services:
  server-dashboard:
    build: .
    container_name: server-dashboard
    restart: unless-stopped
    ports:
      - "8070:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
